name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
categories:
  - title: '✨ Features'
    labels:
      - 'feature'
  - title: '🐛 Fixes'
    labels:
      - 'bug'
  - title: '🧪 Tests'
    labels:
      - 'test'
change-template: '- $TITLE (#$NUMBER)'
template: |
  ## Changes
  $CHANGES